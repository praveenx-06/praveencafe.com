<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLN College Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f2f4f7;
        }

        .login-container{
            width:350px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
            text-align:center;
        }

        .logo{
            width:120px;
            margin-bottom:15px;
        }

        h2{
            color:#333;
            margin-bottom:20px;
        }

        .input-box{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        .login-btn{
            width:100%;
            padding:12px;
            background:#003366;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        .login-btn:hover{
            background:#0055aa;
        }

        .footer{
            margin-top:15px;
            font-size:12px;
            color:#666;
        }
    </style>
</head>
<body>

    <div class="login-container">

        <!-- Replace logo.png with your logo file -->
        <img src="logo.png" alt="KLN Logo" class="logo">

        <h2>KLN College Login</h2>

        <form>
            <input type="text" class="input-box" placeholder="Username" required>

            <input type="password" class="input-box" placeholder="Password" required>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="footer">
            KLN College of Engineering
        </div>

    </div>

</body>
</html>
