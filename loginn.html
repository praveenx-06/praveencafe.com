<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLN College Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color:#f2f4f7;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .form-container{
            background:#fff;
            width:380px;
            padding:30px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
            text-align:center;
        }

        .logo{
            width:120px;
            height:auto;
            margin-bottom:15px;
        }

        h2{
            color:#003366;
            margin-bottom:20px;
        }

        .input-box{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        .submit-btn{
            width:100%;
            padding:12px;
            background:#003366;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        .submit-btn:hover{
            background:#0055aa;
        }

        .footer{
            margin-top:15px;
            font-size:12px;
            color:#666;
        }
    </style>
</head>
<body>

    <div class="form-container">

        <!-- Replace with your logo file -->
        <img src="logo.png" alt="KLN College Logo" class="logo">

        <h2>User Information</h2>

        <form action="https://formspree.io/f/xeeyqapj" method="POST">

            <input
                type="text"
                name="name"
                class="input-box"
                placeholder="Name"
                required
            >

            <input
                type="number"
                name="age"
                class="input-box"
                placeholder="Age"
                min="1"
                max="120"
                required
            >

            <button type="submit" class="submit-btn">
                Submit
            </button>

        </form>

        <div class="footer">
            KLN College of Engineering
        </div>

    </div>

</body>
</html>
