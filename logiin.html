<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name & Username Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #003366;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0055aa;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>KLN College Portal</h2>

        <form action="https://formspree.io/f/xrengpky" method="POST">

            <input
                type="text"
                name="name"
                placeholder="Enter Your Name"
                required
            >

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <button type="submit">Submit</button>

        </form>
    </div>

</body>
</html>
