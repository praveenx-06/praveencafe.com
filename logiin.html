<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name & Age Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background: #ffffff;
            padding: 30px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .form-container h2 {
            text-align: center;
            color: #003366;
            margin-bottom: 20px;
        }

        .input-box {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #cccccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #0055aa;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>User Information</h2>

        <form action="https://formspree.io/f/xeeyqapj" method="POST">

            <input
                type="text"
                name="name"
                class="input-box"
                placeholder="Enter Your Name"
                required
            >

            <input
                type="number"
                name="age"
                class="input-box"
                placeholder="Enter Your Age"
                min="1"
                max="120"
                required
            >

            <button type="submit" class="submit-btn">
                Submit
            </button>

        </form>
    </div>

</body>
</html>
